- name: Install baseline Docker dependencies
  apt:
    name:
      - ca-certificates
      - gnupg
    state: present

- name: Setup Docker keyring GPG directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Retrieve Docker APT repository key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Map Docker APT target repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker and Docker Compose packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: yes
    state: present

- name: Verify deploy user group is present
  group:
    name: deploy
    state: present

- name: Link deploy execution user to docker group permissions
  user:
    name: deploy
    groups: docker
    append: yes
