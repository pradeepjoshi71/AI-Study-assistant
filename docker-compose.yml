version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: study_assistant_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-study_assistant}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-study_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache & Broker
  redis:
    image: redis:7-alpine
    container_name: study_assistant_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: study_assistant_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pass}@postgres:5432/${POSTGRES_DB:-study_assistant}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      API_PREFIX: ${API_PREFIX:-api/v1}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js Frontend Web
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: study_assistant_web
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # FastAPI AI Service
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: study_assistant_ai_service
    restart: always
    environment:
      AI_PORT: ${AI_PORT:-8000}
      AI_HOST: ${AI_HOST:-0.0.0.0}
      AI_REDIS_HOST: redis
      AI_REDIS_PORT: 6379
      AI_REDIS_PASSWORD: ""
      QDRANT_HOST: qdrant
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: study_assistant_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
