version: '3.8'

services:
  # PostgreSQL Database Primary
  postgres:
    image: postgres:16-alpine
    container_name: study_assistant_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-study_assistant}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=3", "-c", "archive_mode=on", "-c", "archive_command=cd .", "-c", "hot_standby=on"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-study_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL Database Replica
  postgres-replica:
    image: postgres:16-alpine
    container_name: study_assistant_postgres_replica
    restart: always
    environment:
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-repl_user}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
      PGUSER: ${POSTGRES_REPLICATION_USER:-repl_user}
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-repl_password}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/init-replica.sh:/init-replica.sh
    entrypoint: ["/bin/sh", "/init-replica.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REPLICATION_USER:-repl_user}"]
      interval: 5s
      timeout: 5s
      retries: 5


  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: study_assistant_redis_master
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Replica
  redis-replica:
    image: redis:7-alpine
    container_name: study_assistant_redis_replica
    restart: always
    command: redis-server --replicaof redis-master 6379 --maxmemory 512mb --maxmemory-policy allkeys-lru
    depends_on:
      - redis-master
    volumes:
      - redis_replica_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Sentinel
  redis-sentinel:
    image: redis:7-alpine
    container_name: study_assistant_redis_sentinel
    restart: always
    command: >
      sh -c "echo 'port 26379' > /tmp/sentinel.conf &&
             echo 'sentinel monitor mymaster redis-master 6379 1' >> /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
             redis-server /tmp/sentinel.conf --sentinel"
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
      - redis-replica
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  # NestJS Backend API (runs in PM2 cluster mode)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: study_assistant_api
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pass}@postgres:5432/${POSTGRES_DB:-study_assistant}?schema=public
      REDIS_SENTINEL_HOST: redis-sentinel
      REDIS_SENTINEL_PORT: 26379
      REDIS_PASSWORD: ""

      API_PREFIX: ${API_PREFIX:-api/v1}
      NEXT_PUBLIC_AI_SERVICE_URL: http://ai-service:8000
      QDRANT_HOST: qdrant-node1
      QDRANT_PORT: 6333
      # MinIO / S3-compatible storage
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-study-assistant}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_USE_SSL: "false"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis-sentinel:
        condition: service_healthy
      minio:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Next.js Frontend Web
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: study_assistant_web
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_AI_SERVICE_URL: ${NEXT_PUBLIC_AI_SERVICE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # FastAPI AI Web Service (runs in Gunicorn with 4 workers, no background queue workers)
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: study_assistant_ai_service
    restart: always
    environment:
      AI_PORT: ${AI_PORT:-8000}
      AI_HOST: ${AI_HOST:-0.0.0.0}
      AI_REDIS_HOST: redis-master
      AI_REDIS_PORT: 6379
      AI_REDIS_PASSWORD: ""
      QDRANT_HOST: qdrant-node1
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pass}@postgres:5432/${POSTGRES_DB:-study_assistant}?schema=public
      RUN_BACKGROUND_WORKERS: "false"
    ports:
      - "8000:8000"
    depends_on:
      redis-sentinel:
        condition: service_healthy
      qdrant-node1:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Isolated BullMQ Worker (handles document parsing and embedding generation in separate process)
  worker:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: study_assistant_worker
    restart: always
    environment:
      AI_REDIS_HOST: redis-master
      AI_REDIS_PORT: 6379
      AI_REDIS_PASSWORD: ""
      QDRANT_HOST: qdrant-node1
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pass}@postgres:5432/${POSTGRES_DB:-study_assistant}?schema=public
      RUN_BACKGROUND_WORKERS: "false"
    command: python run_workers.py
    depends_on:
      redis-sentinel:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis; r = redis.Redis(host=\"redis-master\", port=6379); r.ping()'"]
      interval: 30s
      timeout: 10s
      retries: 3


  # MinIO Object Storage (S3-compatible, Minio for local / self-hosted)
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: study_assistant_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MinIO bucket initialiser (creates default bucket on first boot)
  minio-init:
    image: minio/mc:RELEASE.2024-04-01T11-31-24Z
    container_name: study_assistant_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/$${MINIO_BUCKET:-study-assistant};
        mc anonymous set download local/$${MINIO_BUCKET:-study-assistant};
        exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-study-assistant}
    restart: "no"

  # Qdrant Node 1 (Primary / Write Node)
  qdrant-node1:
    image: qdrant/qdrant:latest
    container_name: study_assistant_qdrant_node1
    restart: always
    environment:
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__PEER=http://qdrant-node2:6335
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_node1_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant Node 2 (Replica / Secondary Node)
  qdrant-node2:
    image: qdrant/qdrant:latest
    container_name: study_assistant_qdrant_node2
    restart: always
    environment:
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__PEER=http://qdrant-node1:6335
    ports:
      - "6335:6333"
    depends_on:
      - qdrant-node1
    volumes:
      - qdrant_node2_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_master_data:
    driver: local
  redis_replica_data:
    driver: local
  qdrant_node1_data:
    driver: local
  qdrant_node2_data:
    driver: local
  minio_data:
    driver: local

