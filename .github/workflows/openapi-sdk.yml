name: OpenAPI SDK Generation & Publish

on:
  push:
    paths:
      - 'apps/api/src/public-api/**'
      - 'apps/api/openapi.json'
  pull_request:
    paths:
      - 'apps/api/src/public-api/**'
      - 'apps/api/openapi.json'

jobs:
  openapi-validation:
    name: Validate API Changes & Check Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Current Commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to fetch main branch history

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-size: 18

      - name: Fetch Previous OpenAPI Specification
        run: |
          git show origin/main:apps/api/openapi.json > openapi-previous.json || echo "{}" > openapi-previous.json

      - name: Detect Breaking Changes vs Main
        run: |
          # If main openapi.json exists and is not empty, run openapi-diff
          if [ -s openapi-previous.json ] && [ "$(cat openapi-previous.json)" != "{}" ]; then
            echo "Comparing current openapi.json against main branch..."
            # Install openapi-diff CLI and compare specs, fails with non-zero exit code if breaking changes found
            npx openapi-diff openapi-previous.json apps/api/openapi.json
          else
            echo "No previous openapi.json spec found on main. Skipping diff analysis."
          fi

  generate-sdk:
    name: Generate and Publish Client SDKs
    needs: openapi-validation
    if: github.ref == 'refs/heads/main' # Only publish on push to main branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Generate TypeScript SDK
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i apps/api/openapi.json \
            -g typescript-fetch \
            -o sdk/typescript \
            --additional-properties=npmName=@study-assistant/sdk-typescript,supportsES6=true

      - name: Generate Python SDK
        run: |
          npx @openapitools/openapi-generator-cli generate \
            -i apps/api/openapi.json \
            -g python \
            -o sdk/python \
            --additional-properties=packageName=study_assistant_sdk_python

      - name: Bump SDK Versions (Match API / Tag Version)
        run: |
          # Bumps npm version in generated typescript SDK
          cd sdk/typescript
          npm version patch --no-git-tag-version
          
          # Bumps version in setup.py for Python SDK
          cd ../python
          sed -i "s/VERSION = \"1.0.0\"/VERSION = \"1.0.$(date +%Y%m%d%H%M%S)\"/g" setup.py || true

      - name: Publish TypeScript SDK to npm
        run: |
          cd sdk/typescript
          # Uncomment when authenticating with NPM_TOKEN
          # npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and Publish Python SDK to PyPI
        run: |
          cd sdk/python
          python -m build
          # Uncomment when authenticating with PyPI token
          # twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
