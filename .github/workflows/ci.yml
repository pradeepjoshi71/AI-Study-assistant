name: "CI — Lint, Test, Typecheck"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: NestJS API Checks
  # ─────────────────────────────────────────────────────────
  api-ci:
    name: "API — Lint + Typecheck + Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate

      - name: Typecheck (NestJS API)
        run: npm run build -w @study-assistant/api
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Lint (NestJS API)
        run: cd apps/api && npx eslint src --ext .ts --max-warnings 0

      - name: Run Unit Tests
        run: cd apps/api && npm test -- --passWithNoTests --ci
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          REDIS_HOST: "localhost"
          JWT_SECRET: "test-secret-for-ci"

  # ─────────────────────────────────────────────────────────
  # JOB 2: Next.js Web Checks
  # ─────────────────────────────────────────────────────────
  web-ci:
    name: "Web — Lint + Typecheck + Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (Next.js)
        run: cd apps/web && npx tsc --noEmit

      - name: Lint (Next.js)
        run: cd apps/web && npx next lint

      - name: Build (verify no compilation errors)
        run: npm run build -w @study-assistant/web
        env:
          NEXT_PUBLIC_API_URL: "https://api.example.com/api/v1"
          NEXT_PUBLIC_AI_SERVICE_URL: "https://ai.example.com"

  # ─────────────────────────────────────────────────────────
  # JOB 3: FastAPI AI Service Checks
  # ─────────────────────────────────────────────────────────
  ai-service-ci:
    name: "AI Service — Lint + Typecheck + Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff mypy pytest pytest-asyncio

      - name: Lint with Ruff
        run: ruff check app/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          REDIS_HOST: "localhost"
          QDRANT_HOST: "localhost"
          GEMINI_API_KEY: "test-key-for-ci"

  # ─────────────────────────────────────────────────────────
  # JOB 4: Docker Build Validation (no push)
  # ─────────────────────────────────────────────────────────
  docker-build-check:
    name: "Docker — Build validation"
    runs-on: ubuntu-latest
    needs: [api-ci, web-ci, ai-service-ci]

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: apps/api/Dockerfile
            context: .
          - name: web
            dockerfile: apps/web/Dockerfile
            context: .
          - name: ai-service
            dockerfile: apps/ai-service/Dockerfile
            context: apps/ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }} image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: ${{ matrix.service.name }}:ci-check
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ─────────────────────────────────────────────────────────
  # JOB 5: Security Scanning (Trivy)
  # ─────────────────────────────────────────────────────────
  security-scan:
    name: "Security — Trivy Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [docker-build-check]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Don't fail CI but report findings

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
