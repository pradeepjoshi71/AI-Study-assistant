name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. PATH FILTERING ──────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changed Services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package*.json'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package*.json'
            ai:
              - 'apps/ai-service/**'

  # ─── 2. NEXT.JS (WEB) PIPELINE ──────────────────────────────────────────────
  web-lint-typecheck-test:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Next.js
        run: npm run lint --workspace=apps/web

      - name: Typecheck Next.js
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Run Next.js Tests (80% Threshold)
        run: npm run test --workspace=apps/web -- --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

  web-docker-build-scan:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: true
          tags: web-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Scan (Fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'web-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  # ─── 3. NESTJS (API) PIPELINE ───────────────────────────────────────────────
  api-lint-typecheck-test:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate

      - name: Lint NestJS
        run: npm run lint --workspace=apps/api

      - name: Typecheck NestJS
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: Run NestJS Tests (80% Threshold)
        run: npm run test --workspace=apps/api -- --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

  api-docker-build-scan:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: api-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Scan (Fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  # ─── 4. FASTAPI (AI SERVICE) PIPELINE ───────────────────────────────────────
  ai-lint-typecheck-test:
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/ai-service/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pytest-asyncio
          pip install -r apps/ai-service/requirements.txt

      - name: Lint FastAPI (Ruff)
        run: ruff check apps/ai-service

      - name: Typecheck FastAPI (Mypy)
        run: mypy apps/ai-service/app --ignore-missing-imports

      - name: Run FastAPI Tests (80% Coverage)
        run: pytest apps/ai-service/tests -v --cov=apps/ai-service/app --cov-fail-under=80

  ai-docker-build-scan:
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AI Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: false
          load: true
          tags: ai-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Security Scan (Fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ai-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  # ─── 5. STATUS CONSOLIDATION GATE ───────────────────────────────────────────
  ci-status:
    needs:
      - changes
      - web-lint-typecheck-test
      - web-docker-build-scan
      - api-lint-typecheck-test
      - api-docker-build-scan
      - ai-lint-typecheck-test
      - ai-docker-build-scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify All Jobs Succeeded
        run: |
          # Check changes detection output
          WEB_CHANGES="${{ needs.changes.outputs.web }}"
          API_CHANGES="${{ needs.changes.outputs.api }}"
          AI_CHANGES="${{ needs.changes.outputs.ai }}"

          # Verify Web Status
          if [[ "$WEB_CHANGES" == "true" ]]; then
            if [[ "${{ needs.web-lint-typecheck-test.result }}" != "success" ]]; then echo "Web lint/test job failed"; exit 1; fi
            if [[ "${{ needs.web-docker-build-scan.result }}" != "success" ]]; then echo "Web docker build/scan job failed"; exit 1; fi
          fi

          # Verify API Status
          if [[ "$API_CHANGES" == "true" ]]; then
            if [[ "${{ needs.api-lint-typecheck-test.result }}" != "success" ]]; then echo "API lint/test job failed"; exit 1; fi
            if [[ "${{ needs.api-docker-build-scan.result }}" != "success" ]]; then echo "API docker build/scan job failed"; exit 1; fi
          fi

          # Verify AI Status
          if [[ "$AI_CHANGES" == "true" ]]; then
            if [[ "${{ needs.ai-lint-typecheck-test.result }}" != "success" ]]; then echo "AI lint/test job failed"; exit 1; fi
            if [[ "${{ needs.ai-docker-build-scan.result }}" != "success" ]]; then echo "AI docker build/scan job failed"; exit 1; fi
          fi

          echo "All checks passed successfully."
